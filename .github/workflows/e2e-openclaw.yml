name: E2E — Openclaw Agent

# OpenClaw is a fully self-hosted open-source agent. This workflow simulates
# an openclaw agent environment by invoking the agentverse CLI with
# --agent-kind openclaw, exercising the full 13-step skill lifecycle.
#
# Triggered by ci.yml via workflow_call, or manually for debugging.
on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"

jobs:
  e2e-openclaw:
    name: Openclaw Agent E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: agentverse
          POSTGRES_PASSWORD: agentverse_test
          POSTGRES_DB: agentverse_openclaw_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://agentverse:agentverse_test@localhost:5432/agentverse_openclaw_e2e
      JWT_SECRET: openclaw-e2e-test-secret-do-not-use-in-production
      PORT: "18081"
      # Variables consumed by scripts/openclaw_e2e.sh
      AGENTVERSE_CLI: "./target/debug/agentverse"
      AGENTVERSE_URL: "http://localhost:18081"
      AGENT_USER: "openclaw-e2e-agent"
      AGENT_PASS: "OpenclawPass1!"
      AGENT_EMAIL: "openclaw-e2e@agentverse.test"
      TEST_SKILL_NS: "openclaw-e2e"
      TEST_SKILL_NAME: "code-helper"
      AGENT_KIND: "openclaw"

    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-openclaw

      - name: Build server and CLI (debug)
        run: vx cargo build -p agentverse-server -p agentverse

      - name: Start server in background
        run: |
          mkdir -p /tmp/agentverse-openclaw
          RUST_LOG=info,agentverse=debug \
            nohup ./target/debug/agentverse-server \
            > /tmp/agentverse-openclaw/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          echo "Server started with PID $!"

      - name: Wait for server to be ready
        run: |
          echo "Waiting for http://localhost:${PORT}/health (up to 90s)..."
          DEADLINE=$(( $(date +%s) + 90 ))
          while true; do
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              echo "❌ Server process (PID=${SERVER_PID}) exited unexpectedly"
              cat /tmp/agentverse-openclaw/server.log || true
              exit 1
            fi
            if curl -sf "http://localhost:${PORT}/health" > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "❌ Server did not respond within 90 seconds"
              cat /tmp/agentverse-openclaw/server.log || true
              exit 1
            fi
            echo "  still waiting... ($(date -u +%T))"
            sleep 3
          done

      - name: Run Openclaw E2E scenario (13 steps)
        run: |
          chmod +x scripts/openclaw_e2e.sh
          bash scripts/openclaw_e2e.sh

      - name: Dump server logs
        if: always()
        run: |
          echo "=== e2e-openclaw server logs (last 100 lines) ==="
          tail -100 /tmp/agentverse-openclaw/server.log 2>/dev/null || echo "(no log file)"

      - name: Stop server
        if: always()
        run: kill "${SERVER_PID}" 2>/dev/null || true
