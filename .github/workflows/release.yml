name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}
      - name: Extract version from tag
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag_name }}
      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}
      - name: Setup tools (vx)
        run: vx setup
      - name: Add Rust target
        run: vx rustup target add ${{ matrix.target }}
      - name: Fix MSVC linker
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
      - name: Build server and CLI
        shell: bash
        run: |
          vx cargo build --release -p agentverse-server --target ${{ matrix.target }}
          vx cargo build --release -p agentverse --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/agentverse-server-${{ matrix.target }}.tar.gz agentverse-server
          tar -C target/${{ matrix.target }}/release -czf dist/agentverse-${{ matrix.target }}.tar.gz agentverse
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/agentverse-server.exe" -DestinationPath "dist/agentverse-server-${{ matrix.target }}.zip" -Force
          Compress-Archive -Path "target/${{ matrix.target }}/release/agentverse.exe" -DestinationPath "dist/agentverse-${{ matrix.target }}.zip" -Force
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: [prepare-release, build]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts && sha256sum agentverse-* > agentverse-checksums.txt
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" --title "${RELEASE_TAG}" --generate-notes
          fi