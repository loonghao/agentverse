name: Publish Skills to ClawHub

on:
  push:
    branches: [main]
    paths: ["skills/**/SKILL.md"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skills:
    name: Publish AgentVerse CLI to ClawHub
    runs-on: ubuntu-latest
    if: github.repository == 'loonghao/agentverse'

    # Only our own skill is published to ClawHub.
    # Other skills in skills/ are local examples/templates for the registry.
    env:
      SKILL: agentverse-openclaw
      SLUG: agentverse-cli
      DISPLAY_NAME: "AgentVerse CLI"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check CLAWHUB_TOKEN
        id: token_check
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret not set — skipping publish"
            echo "Add a CLAWHUB_TOKEN secret to enable automatic ClawHub publishing."
            echo "Get your token at: https://clawhub.ai/settings/tokens"
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify skill directory
        id: check
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          SKILL_DIR="skills/${SKILL}"
          if [ ! -f "$SKILL_DIR/SKILL.md" ]; then
            echo "::warning::No SKILL.md found in $SKILL_DIR, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
            VERSION=$(grep '^version:' "$SKILL_DIR/SKILL.md" | head -1 | sed 's/version: *//')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ClawHub
        if: steps.token_check.outputs.has_token == 'true' && steps.check.outputs.skip == 'false'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npx --yes clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish to ClawHub
        if: steps.token_check.outputs.has_token == 'true' && steps.check.outputs.skip == 'false'
        run: |
          echo "Publishing ${SKILL} (slug: ${SLUG}) v${{ steps.check.outputs.version }} to ClawHub..."
          npx clawhub@latest publish "${{ steps.check.outputs.skill_dir }}" \
            --slug "${SLUG}" \
            --name "${DISPLAY_NAME}" \
            --version "${{ steps.check.outputs.version }}" \
            --tags "latest" \
            --changelog ""
          echo "✓ Published ${SLUG} v${{ steps.check.outputs.version }}"
