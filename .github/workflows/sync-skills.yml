name: Publish Skills to ClawHub

on:
  push:
    branches: [main]
    paths: ["skills/**/SKILL.md"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skills:
    name: Publish ${{ matrix.skill }} to ClawHub
    runs-on: ubuntu-latest
    if: github.repository == 'loonghao/agentverse'

    # Discover every sub-directory under skills/ that contains a SKILL.md
    strategy:
      fail-fast: false
      matrix:
        skill:
          - agentverse-openclaw

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify skill directory
        id: check
        run: |
          SKILL_DIR="skills/${{ matrix.skill }}"
          if [ ! -f "$SKILL_DIR/SKILL.md" ]; then
            echo "::warning::No SKILL.md found in $SKILL_DIR, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to ClawHub
        if: steps.check.outputs.skip == 'false'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret not set — skipping publish"
            echo "Add a CLAWHUB_TOKEN secret to enable automatic ClawHub publishing."
            echo "Get your token at: https://clawhub.ai/settings/tokens"
            exit 0
          fi
          echo "Publishing ${{ matrix.skill }} to ClawHub..."
          npx --yes clawhub@latest publish "${{ steps.check.outputs.skill_dir }}"
          echo "✓ Published ${{ matrix.skill }}"
