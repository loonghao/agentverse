name: Publish Skills to ClawHub

on:
  push:
    branches: [main]
    paths: ["skills/**/SKILL.md"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skills:
    name: Publish ${{ matrix.skill }} to ClawHub
    runs-on: ubuntu-latest
    if: github.repository == 'loonghao/agentverse'

    strategy:
      fail-fast: false
      matrix:
        include:
          - skill: agentverse-openclaw
            slug: agentverse-cli
            display_name: "AgentVerse CLI"
          - skill: api-smoke-tester
            slug: api-smoke-tester
            display_name: "API Smoke Tester"
          - skill: code-reviewer
            slug: code-reviewer
            display_name: "Code Reviewer"
          - skill: release-notes-writer
            slug: release-notes-writer
            display_name: "Release Notes Writer"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check CLAWHUB_TOKEN
        id: token_check
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret not set — skipping publish"
            echo "Add a CLAWHUB_TOKEN secret to enable automatic ClawHub publishing."
            echo "Get your token at: https://clawhub.ai/settings/tokens"
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify skill directory
        id: check
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          SKILL_DIR="skills/${{ matrix.skill }}"
          if [ ! -f "$SKILL_DIR/SKILL.md" ]; then
            echo "::warning::No SKILL.md found in $SKILL_DIR, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skill_dir=$SKILL_DIR" >> "$GITHUB_OUTPUT"
            # Extract version from SKILL.md frontmatter
            VERSION=$(grep '^version:' "$SKILL_DIR/SKILL.md" | head -1 | sed 's/version: *//')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ClawHub
        if: steps.token_check.outputs.has_token == 'true' && steps.check.outputs.skip == 'false'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npx --yes clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish to ClawHub
        if: steps.token_check.outputs.has_token == 'true' && steps.check.outputs.skip == 'false'
        run: |
          echo "Publishing ${{ matrix.skill }} (slug: ${{ matrix.slug }}) v${{ steps.check.outputs.version }} to ClawHub..."
          npx clawhub@latest publish "${{ steps.check.outputs.skill_dir }}" \
            --slug "${{ matrix.slug }}" \
            --name "${{ matrix.display_name }}" \
            --version "${{ steps.check.outputs.version }}" \
            --tags "latest" \
            --changelog ""
          echo "✓ Published ${{ matrix.slug }} v${{ steps.check.outputs.version }}"
