name: Docker Publish

# ── Overview ──────────────────────────────────────────────────────────────────
# Instead of running `cargo build` inside Docker (which is slow, especially
# for ARM64 where QEMU emulation makes the Rust compiler painfully slow), we:
#
#   1. Build the server binary natively on the correct runner architecture.
#   2. Copy the pre-built binary + runtime assets into a tiny Docker image
#      using Dockerfile.prebuilt (no Rust toolchain needed at all).
#
# Each platform job is self-contained: compile → stage → docker push.
# No inter-job artifact transfer is required.

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  GHCR_REPO: ghcr.io/loonghao/agentverse
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"

jobs:
  # ── Step 1 + 2 combined: build binary natively, then build Docker image ───
  build-and-push:
    name: Build & push (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # AMD64: native build on standard ubuntu runner
          - os: ubuntu-latest
            platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          # ARM64: native build on arm64 runner — no QEMU needed for compilation
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || '' }}

      # ── Resolve version ───────────────────────────────────────────────────
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            VERSION="${{ inputs.tag_name }}"
          else
            # push to tag: GITHUB_REF = refs/tags/v1.2.3
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Extract platform suffix
        id: platform
        shell: bash
        run: |
          echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      # ── Native Rust build ─────────────────────────────────────────────────
      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-docker-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docker-${{ matrix.target }}

      - name: Build server binary (native)
        run: vx cargo build --release -p agentverse-server --target ${{ matrix.target }}

      # ── Prepare Docker build context ──────────────────────────────────────
      # Collect the binary + runtime assets into a flat staging directory so
      # Dockerfile.prebuilt can COPY them without any path gymnastics.
      - name: Stage build artifacts
        shell: bash
        run: |
          mkdir -p docker-staging
          cp target/${{ matrix.target }}/release/agentverse-server docker-staging/agentverse-server
          cp -r config    docker-staging/config
          cp -r migrations docker-staging/migrations

      # ── Docker: build & push ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No QEMU required: the runner IS the target architecture.
      # Dockerfile.prebuilt only runs `apt-get install` and `chmod`, which
      # execute on the native runner — no emulation overhead at all.
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker-staging
          file: Dockerfile.prebuilt
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ env.GHCR_REPO }}:${{ steps.version.outputs.version_short }}-${{ steps.platform.outputs.suffix }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version_short }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/loonghao/agentverse
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: Merge per-platform images into a multi-arch manifest ──────────
  create-manifest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            VERSION="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push GHCR manifest
        run: |
          V="${{ steps.version.outputs.version_short }}"
          docker manifest rm ${{ env.GHCR_REPO }}:${V} 2>/dev/null || true
          docker manifest rm ${{ env.GHCR_REPO }}:latest 2>/dev/null || true
          docker manifest create ${{ env.GHCR_REPO }}:${V} \
            ${{ env.GHCR_REPO }}:${V}-linux-amd64 \
            ${{ env.GHCR_REPO }}:${V}-linux-arm64
          docker manifest push ${{ env.GHCR_REPO }}:${V}
          docker manifest create ${{ env.GHCR_REPO }}:latest \
            ${{ env.GHCR_REPO }}:${V}-linux-amd64 \
            ${{ env.GHCR_REPO }}:${V}-linux-arm64
          docker manifest push ${{ env.GHCR_REPO }}:latest
