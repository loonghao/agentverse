name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"
  # Shared postgres credentials used by e2e job
  POSTGRES_USER: agentverse
  POSTGRES_PASSWORD: agentverse_test
  POSTGRES_DB: agentverse_e2e

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust components
        run: vx rustup component add clippy rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run quality checks
        run: vx just ci

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Fix MSVC linker (remove Git link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}

      - name: Run tests
        run: vx just test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality]
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add llvm-tools-preview
        run: vx rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: vx cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust target
        run: vx rustup target add ${{ matrix.target }}

      - name: Fix MSVC linker (remove Git link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release binaries
        run: vx just build-release-target ${{ matrix.target }}

      - name: Smoke test — server binary
        shell: bash
        run: |
          BIN_EXT=""
          [ "${{ runner.os }}" = "Windows" ] && BIN_EXT=".exe"
          SERVER="target/${{ matrix.target }}/release/agentverse-server${BIN_EXT}"
          CLI="target/${{ matrix.target }}/release/agentverse${BIN_EXT}"
          echo "=== agentverse-server --version ==="
          "$SERVER" --version
          echo "=== agentverse --version ==="
          "$CLI" --version

  # ── Skill file validation ────────────────────────────────────────────────────
  validate-skills:
    name: Validate Skill Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate SKILL.md frontmatter
        shell: bash
        run: |
          set -euo pipefail
          # name + description are universally required (matches the AgentVerse standard format).
          # kind, version, author, license are recommended but optional (kind defaults to "skill").
          REQUIRED_FIELDS=(name description)
          RECOMMENDED_FIELDS=(kind version author license)
          VALID_KINDS=(skill soul prompt workflow agent)
          ERRORS=0

          for skill_md in skills/*/SKILL.md; do
            echo "── Checking $skill_md"

            # Must start with YAML frontmatter delimiters
            if ! head -1 "$skill_md" | grep -qE '^---'; then
              echo "  ❌ Missing opening '---' frontmatter"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            for field in "${REQUIRED_FIELDS[@]}"; do
              if ! grep -qE "^${field}:" "$skill_md"; then
                echo "  ❌ Missing required field: ${field}"
                ERRORS=$((ERRORS + 1))
              fi
            done

            for field in "${RECOMMENDED_FIELDS[@]}"; do
              if ! grep -qE "^${field}:" "$skill_md"; then
                echo "  ⚠️  Missing recommended field: ${field}"
              fi
            done

            # Validate kind value when present
            if grep -qE "^kind:" "$skill_md"; then
              KIND_VAL=$(grep -E "^kind:" "$skill_md" | head -1 | sed 's/^kind:[[:space:]]*//')
              VALID=false
              for vk in "${VALID_KINDS[@]}"; do
                [ "$KIND_VAL" = "$vk" ] && VALID=true && break
              done
              if [ "$VALID" = "false" ]; then
                echo "  ❌ Invalid kind '${KIND_VAL}'. Must be one of: ${VALID_KINDS[*]}"
                ERRORS=$((ERRORS + 1))
              else
                echo "  ✓ kind=${KIND_VAL}"
              fi
            fi

            echo "  ✅ OK"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Skill validation failed with $ERRORS error(s)."
            exit 1
          fi
          echo ""
          echo "All skill files are valid."

  # ── E2E workflows (split by domain for maintainability) ─────────────────────
  # Each workflow file is self-contained (own postgres, server, teardown).
  # They run in parallel after unit tests pass to minimise wall-clock time.

  call-e2e-api:
    name: "E2E → API Tests"
    needs: [test]
    uses: ./.github/workflows/e2e-api.yml
    secrets: inherit

  call-e2e-cli:
    name: "E2E → CLI Integration"
    needs: [test]
    uses: ./.github/workflows/e2e-cli.yml
    secrets: inherit

  call-e2e-memory:
    name: "E2E → Memory & Agent Lifecycle"
    needs: [test]
    uses: ./.github/workflows/e2e-memory.yml
    secrets: inherit

  call-e2e-openclaw:
    name: "E2E → Openclaw Agent"
    # Run after API and CLI pass so we know the basic surfaces are healthy first.
    needs: [call-e2e-api, call-e2e-cli]
    uses: ./.github/workflows/e2e-openclaw.yml
    secrets: inherit

  # ── Auto-merge on CI success ─────────────────────────────────────────────────
  # Automatically enables squash-merge for the PR once all required CI jobs
  # pass.  Release-please PRs are excluded — they must be reviewed and merged
  # manually so that the changelog and version bump can be verified.
  auto-merge:
    name: Auto-merge on CI success
    runs-on: ubuntu-latest
    # Only run on pull_request events (not on push to main).
    if: github.event_name == 'pull_request'
    # Wait for all meaningful CI gates before enabling auto-merge.
    needs: [quality, test, build, validate-skills, call-e2e-api, call-e2e-cli, call-e2e-memory, call-e2e-openclaw]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Skip release-please PRs
        id: check-pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          # release-please opens PRs with a predictable title prefix and branch name.
          if echo "$PR_TITLE" | grep -qE '^(chore|release)(\(.+\))?: release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skipping auto-merge: this is a release-please PR."
          elif echo "$HEAD_BRANCH" | grep -qE '^release-please--'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skipping auto-merge: release-please branch detected."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge (squash)
        if: steps.check-pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch
          echo "✅ Auto-merge enabled for PR #${PR_NUMBER}"
