name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"
  # Shared postgres credentials used by e2e job
  POSTGRES_USER: agentverse
  POSTGRES_PASSWORD: agentverse_test
  POSTGRES_DB: agentverse_e2e

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust components
        run: vx rustup component add clippy rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run quality checks
        run: vx just ci

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Fix MSVC linker (remove Git link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}

      - name: Run tests
        run: vx just test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality]
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add llvm-tools-preview
        run: vx rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: vx cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust target
        run: vx rustup target add ${{ matrix.target }}

      - name: Fix MSVC linker (remove Git link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release binaries
        run: vx just build-release-target ${{ matrix.target }}

      - name: Smoke test — server binary
        shell: bash
        run: |
          BIN_EXT=""
          [ "${{ runner.os }}" = "Windows" ] && BIN_EXT=".exe"
          SERVER="target/${{ matrix.target }}/release/agentverse-server${BIN_EXT}"
          CLI="target/${{ matrix.target }}/release/agentverse${BIN_EXT}"
          echo "=== agentverse-server --version ==="
          "$SERVER" --version
          echo "=== agentverse --version ==="
          "$CLI" --version

  # ── Skill file validation ────────────────────────────────────────────────────
  validate-skills:
    name: Validate Skill Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate SKILL.md frontmatter
        shell: bash
        run: |
          set -euo pipefail
          # name + description are universally required (matches the AgentVerse standard format).
          # kind, version, author, license are recommended but optional (kind defaults to "skill").
          REQUIRED_FIELDS=(name description)
          RECOMMENDED_FIELDS=(kind version author license)
          VALID_KINDS=(skill soul prompt workflow agent)
          ERRORS=0

          for skill_md in skills/*/SKILL.md; do
            echo "── Checking $skill_md"

            # Must start with YAML frontmatter delimiters
            if ! head -1 "$skill_md" | grep -qE '^---'; then
              echo "  ❌ Missing opening '---' frontmatter"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            for field in "${REQUIRED_FIELDS[@]}"; do
              if ! grep -qE "^${field}:" "$skill_md"; then
                echo "  ❌ Missing required field: ${field}"
                ERRORS=$((ERRORS + 1))
              fi
            done

            for field in "${RECOMMENDED_FIELDS[@]}"; do
              if ! grep -qE "^${field}:" "$skill_md"; then
                echo "  ⚠️  Missing recommended field: ${field}"
              fi
            done

            # Validate kind value when present
            if grep -qE "^kind:" "$skill_md"; then
              KIND_VAL=$(grep -E "^kind:" "$skill_md" | head -1 | sed 's/^kind:[[:space:]]*//')
              VALID=false
              for vk in "${VALID_KINDS[@]}"; do
                [ "$KIND_VAL" = "$vk" ] && VALID=true && break
              done
              if [ "$VALID" = "false" ]; then
                echo "  ❌ Invalid kind '${KIND_VAL}'. Must be one of: ${VALID_KINDS[*]}"
                ERRORS=$((ERRORS + 1))
              else
                echo "  ✓ kind=${KIND_VAL}"
              fi
            fi

            echo "  ✅ OK"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Skill validation failed with $ERRORS error(s)."
            exit 1
          fi
          echo ""
          echo "All skill files are valid."

  # ── True E2E: real PostgreSQL + live server ──────────────────────────────────
  e2e:
    name: E2E (real server + PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]

    services:
      postgres:
        # Must use pgvector image — migrations require the "vector" extension
        # (CREATE EXTENSION vector). The plain postgres:17 image does not
        # ship pgvector and will fail on migration 1.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: agentverse
          POSTGRES_PASSWORD: agentverse_test
          POSTGRES_DB: agentverse_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://agentverse:agentverse_test@localhost:5432/agentverse_e2e
      JWT_SECRET: e2e-test-secret-do-not-use-in-production
      PORT: "18080"

    steps:
      - uses: actions/checkout@v6

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.0"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-tools-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e

      - name: Build server and CLI (debug — faster)
        # Build both binaries so the CLI is available for e2e integration tests.
        run: vx cargo build -p agentverse-server -p agentverse

      - name: Start server in background
        run: |
          # Capture all stdout/stderr to a log file so we can diagnose startup failures.
          # RUST_LOG=info ensures migration progress and errors are visible.
          mkdir -p /tmp/agentverse
          RUST_LOG=info,agentverse=debug \
            nohup ./target/debug/agentverse-server \
            > /tmp/agentverse/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          echo "Server started with PID $!"

      - name: Wait for server to be ready
        run: |
          # Standard approach: poll /health with exponential-back-off,
          # detect crashes via kill -0, and show server logs on any failure.
          echo "Waiting for http://localhost:${PORT}/health (up to 90s)..."
          DEADLINE=$(( $(date +%s) + 90 ))
          while true; do
            # Crash detection: if the process exited, bail immediately.
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              echo "❌ Server process (PID=${SERVER_PID}) exited unexpectedly"
              echo "=== Server logs ==="
              cat /tmp/agentverse/server.log || true
              exit 1
            fi

            if curl -sf "http://localhost:${PORT}/health" > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "❌ Server did not respond within 90 seconds"
              echo "=== Server logs ==="
              cat /tmp/agentverse/server.log || true
              exit 1
            fi

            echo "  still waiting... ($(date -u +%T))"
            sleep 3
          done

      - name: E2E — health & readiness
        run: |
          STATUS=$(curl -sf "http://localhost:${PORT}/health" | jq -r '.status')
          [ "$STATUS" = "ok" ] || (echo "❌ health status=$STATUS" && exit 1)
          echo "✅ /health OK"

          # Route is /ready (not /readiness)
          curl -sf "http://localhost:${PORT}/ready" | jq .
          echo "✅ /ready OK"

      - name: E2E — user registration & login
        run: |
          REGISTER=$(curl -sf -X POST "http://localhost:${PORT}/api/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"username":"e2e_user","email":"e2e@agentverse.test","password":"E2ePass123!"}')
          echo "$REGISTER" | jq .
          TOKEN=$(echo "$REGISTER" | jq -r '.access_token')
          [ "$TOKEN" != "null" ] && [ -n "$TOKEN" ] || (echo "❌ No token in register response" && exit 1)
          echo "E2E_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "✅ register OK"

      - name: E2E — create skill
        run: |
          # Manifest uses the correct nested `capabilities` structure.
          # `content` is optional (defaults to null) but included for clarity.
          BODY=$(cat <<'EOF'
          {
            "namespace": "e2eorg",
            "name": "smoke-skill",
            "display_name": "E2E Smoke Skill",
            "content": {},
            "manifest": {
              "description": "Created by E2E test",
              "capabilities": {
                "input_modalities": ["text"],
                "output_modalities": ["text"],
                "protocols": ["mcp"],
                "permissions": []
              },
              "dependencies": {},
              "tags": ["e2e", "smoke"],
              "extra": null
            }
          }
          EOF
          )
          RESP=$(curl -s -w '\n%{http_code}' -X POST "http://localhost:${PORT}/api/v1/skills" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d "$BODY")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY_OUT=$(echo "$RESP" | head -n -1)
          echo "$BODY_OUT" | jq .
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] \
            || (echo "❌ create skill HTTP $HTTP_CODE" && exit 1)
          # Response shape: { "artifact": { "id": "...", ... }, "version": { ... } }
          SKILL_ID=$(echo "$BODY_OUT" | jq -r '.artifact.id // empty')
          [ -n "$SKILL_ID" ] || (echo "❌ No skill id in response" && exit 1)
          echo "E2E_SKILL_ID=$SKILL_ID" >> "$GITHUB_ENV"
          echo "✅ create skill OK: $SKILL_ID"

      - name: E2E — list skills & trending
        run: |
          LIST=$(curl -sf "http://localhost:${PORT}/api/v1/skills")
          TOTAL=$(echo "$LIST" | jq '.total // (.items | length)')
          echo "Skills total: $TOTAL"
          [ "$TOTAL" -ge 1 ] || (echo "❌ expected at least 1 skill" && exit 1)
          echo "✅ list skills OK"

          TRENDING=$(curl -sf "http://localhost:${PORT}/api/v1/trending?kind=skill")
          echo "$TRENDING" | jq '.total'
          echo "✅ trending OK"

      - name: "E2E — social: like & comment"
        run: |
          # Like the skill — use generic /{kind}/... route
          LIKE=$(curl -s -w '\n%{http_code}' -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/likes" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' -d '{}')
          LIKE_CODE=$(echo "$LIKE" | tail -1)
          echo "$LIKE" | head -n -1 | jq .
          [ "$LIKE_CODE" -ge 200 ] && [ "$LIKE_CODE" -lt 300 ] \
            || (echo "❌ like HTTP $LIKE_CODE" && exit 1)
          echo "✅ like OK"

          # Add a comment
          CMT=$(curl -s -w '\n%{http_code}' -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"content":"E2E comment","kind":"review"}')
          CMT_CODE=$(echo "$CMT" | tail -1)
          echo "$CMT" | head -n -1 | jq .
          [ "$CMT_CODE" -ge 200 ] && [ "$CMT_CODE" -lt 300 ] \
            || (echo "❌ comment HTTP $CMT_CODE" && exit 1)
          echo "✅ comment OK"

      # ── Import from GitHub (real SKILL.md parsing) ─────────────────────────
      - name: "E2E — import skill from GitHub (tags + metadata round-trip)"
        run: |
          # Import one of our own skills from the public repo.
          # This exercises the full parse_skill_md → Manifest pipeline on a live server.
          IMPORT_RESP=$(curl -s -w '\n%{http_code}' -X POST \
            "http://localhost:${PORT}/api/v1/skills/import" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{
              "url": "https://github.com/loonghao/agentverse/tree/main/skills/ripgrep-search",
              "namespace": "e2eorg"
            }')
          IMPORT_CODE=$(echo "$IMPORT_RESP" | tail -1)
          IMPORT_BODY=$(echo "$IMPORT_RESP" | head -n -1)
          echo "$IMPORT_BODY" | jq .
          [ "$IMPORT_CODE" -ge 200 ] && [ "$IMPORT_CODE" -lt 300 ] \
            || (echo "❌ import HTTP $IMPORT_CODE" && exit 1)

          # Verify name was extracted from SKILL.md frontmatter
          IMPORTED_NAME=$(echo "$IMPORT_BODY" | jq -r '.skill.name // empty')
          [ "$IMPORTED_NAME" = "ripgrep-search" ] \
            || (echo "❌ expected name=ripgrep-search, got: $IMPORTED_NAME" && exit 1)
          echo "✅ import skill OK: name=$IMPORTED_NAME"

          # Verify tags were extracted and stored
          TAG_COUNT=$(echo "$IMPORT_BODY" | jq '.skill.tags | length')
          [ "$TAG_COUNT" -ge 1 ] \
            || (echo "❌ expected tags in imported skill, got none" && exit 1)
          echo "✅ tags extracted: $(echo "$IMPORT_BODY" | jq -c '.skill.tags')"

          # Verify license was populated
          LICENSE=$(echo "$IMPORT_BODY" | jq -r '.skill.license // empty')
          [ -n "$LICENSE" ] \
            || (echo "❌ expected license field in imported skill" && exit 1)
          echo "✅ license: $LICENSE"

      - name: "E2E — import agentverse-openclaw skill (metadata.openclaw round-trip)"
        run: |
          # Test with a skill that uses the extended metadata.openclaw format
          IMPORT_RESP=$(curl -s -w '\n%{http_code}' -X POST \
            "http://localhost:${PORT}/api/v1/skills/import" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{
              "url": "https://github.com/loonghao/agentverse/tree/main/skills/agentverse-openclaw",
              "namespace": "e2eorg"
            }')
          IMPORT_CODE=$(echo "$IMPORT_RESP" | tail -1)
          IMPORT_BODY=$(echo "$IMPORT_RESP" | head -n -1)
          echo "$IMPORT_BODY" | jq .
          [ "$IMPORT_CODE" -ge 200 ] && [ "$IMPORT_CODE" -lt 300 ] \
            || (echo "❌ import openclaw HTTP $IMPORT_CODE" && exit 1)

          IMPORTED_NAME=$(echo "$IMPORT_BODY" | jq -r '.skill.name // empty')
          [ "$IMPORTED_NAME" = "agentverse-cli" ] \
            || (echo "❌ expected name=agentverse-cli, got: $IMPORTED_NAME" && exit 1)
          echo "✅ import agentverse-openclaw OK: name=$IMPORTED_NAME"

      # ═══════════════════════════════════════════════════════════════════════════
      # AUTH HARDENING
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Auth — wrong password → 401"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/auth/login" \
            -H 'content-type: application/json' \
            -d '{"username":"e2e_user","password":"totallyWrongPassword!"}')
          [ "$HTTP" -eq 401 ] \
            || (echo "❌ expected 401 for wrong password, got $HTTP" && exit 1)
          echo "✅ wrong password → 401"

      - name: "Auth — duplicate username → 409"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"username":"e2e_user","email":"dup@agentverse.test","password":"DupPass123!"}')
          [ "$HTTP" -eq 409 ] \
            || (echo "❌ expected 409 for duplicate username, got $HTTP" && exit 1)
          echo "✅ duplicate username → 409"

      - name: "Auth — token refresh (POST /auth/refresh)"
        run: |
          RESP=$(curl -sf -X POST "http://localhost:${PORT}/api/v1/auth/refresh" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          NEW_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')
          [ -n "$NEW_TOKEN" ] \
            || (echo "❌ no new access_token in refresh response" && exit 1)
          echo "✅ token refresh OK"

      - name: "Auth — GET /auth/me returns correct user"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/auth/me" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          USERNAME=$(echo "$RESP" | jq -r '.user.username // empty')
          [ "$USERNAME" = "e2e_user" ] \
            || (echo "❌ expected username=e2e_user, got $USERNAME" && exit 1)
          echo "✅ /auth/me OK: username=$USERNAME"

      - name: "Auth — PUT /auth/me updates email"
        run: |
          RESP=$(curl -sf -X PUT "http://localhost:${PORT}/api/v1/auth/me" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"email":"e2e_updated@agentverse.test"}')
          EMAIL=$(echo "$RESP" | jq -r '.user.email // empty')
          [ "$EMAIL" = "e2e_updated@agentverse.test" ] \
            || (echo "❌ expected updated email, got $EMAIL" && exit 1)
          echo "✅ update profile OK: email=$EMAIL"

      - name: "Auth — public user profile does not expose password_hash"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/users/e2e_user")
          USERNAME=$(echo "$RESP" | jq -r '.user.username // empty')
          PW=$(echo "$RESP" | jq -r '.user.password_hash // "absent"')
          [ "$USERNAME" = "e2e_user" ] \
            || (echo "❌ expected username=e2e_user, got $USERNAME" && exit 1)
          [ "$PW" = "absent" ] \
            || (echo "❌ password_hash exposed in public profile!" && exit 1)
          echo "✅ public profile OK, password_hash not exposed"

      # ═══════════════════════════════════════════════════════════════════════════
      # VERSIONING LIFECYCLE
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Versioning — list versions (smoke-skill has initial 0.1.0)"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/versions")
          TOTAL=$(echo "$RESP" | jq '.total // (.versions | length)')
          [ "$TOTAL" -ge 1 ] \
            || (echo "❌ expected ≥1 version, got $TOTAL" && exit 1)
          echo "✅ list versions OK: $TOTAL version(s)"

      - name: "Versioning — publish patch version"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/publish" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"content":{"schema_version":"1.1"},"changelog":"patch: improve schema","bump":"patch"}')
          VER=$(echo "$RESP" | jq -r '.version.version // empty')
          [ -n "$VER" ] || (echo "❌ no version in publish response" && exit 1)
          echo "E2E_PATCH_VER=$VER" >> "$GITHUB_ENV"
          echo "✅ patch publish OK: $VER"

      - name: "Versioning — publish minor version"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/publish" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"content":{"schema_version":"2.0","new_feature":true},"changelog":"minor: new feature","bump":"minor"}')
          VER=$(echo "$RESP" | jq -r '.version.version // empty')
          [ -n "$VER" ] || (echo "❌ no version in publish response" && exit 1)
          echo "E2E_MINOR_VER=$VER" >> "$GITHUB_ENV"
          echo "✅ minor publish OK: $VER"

      - name: "Versioning — list versions shows full history (≥3)"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/versions")
          TOTAL=$(echo "$RESP" | jq '.total // (.versions | length)')
          [ "$TOTAL" -ge 3 ] \
            || (echo "❌ expected ≥3 versions after two publishes, got $TOTAL" && exit 1)
          echo "✅ version history OK: $TOTAL versions"

      - name: "Versioning — get skill at pinned version 0.1.0"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/0.1.0")
          VER=$(echo "$RESP" | jq -r '.version.version // empty')
          [ "$VER" = "0.1.0" ] \
            || (echo "❌ expected version=0.1.0, got $VER" && exit 1)
          echo "✅ pinned version fetch OK: $VER"

      # ═══════════════════════════════════════════════════════════════════════════
      # RATING SYSTEM
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Rating — add 5-star rating with review text"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/ratings" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"score":5,"review_text":"Works perfectly in production!"}')
          SCORE=$(echo "$RESP" | jq -r '.rating.score // empty')
          [ "$SCORE" = "5" ] \
            || (echo "❌ expected score=5, got $SCORE" && exit 1)
          echo "✅ 5-star rating OK"

      - name: "Rating — reject score=0 → 400"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/ratings" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"score":0}')
          [ "$HTTP" -eq 400 ] \
            || (echo "❌ expected 400 for score=0, got $HTTP" && exit 1)
          echo "✅ score=0 → 400"

      - name: "Rating — reject score=6 → 400"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/ratings" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"score":6}')
          [ "$HTTP" -eq 400 ] \
            || (echo "❌ expected 400 for score=6, got $HTTP" && exit 1)
          echo "✅ score=6 → 400"

      - name: "Rating — list ratings and verify stats avg_rating"
        run: |
          RATINGS=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/ratings")
          TOTAL=$(echo "$RATINGS" | jq '.total // (.ratings | length)')
          [ "$TOTAL" -ge 1 ] \
            || (echo "❌ expected ≥1 rating, got $TOTAL" && exit 1)
          echo "✅ list ratings OK: $TOTAL rating(s)"

          STATS=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/stats")
          AVG=$(echo "$STATS" | jq '.avg_rating')
          [ "$AVG" != "null" ] \
            || (echo "❌ avg_rating should not be null after a rating" && exit 1)
          echo "✅ stats OK: avg_rating=$AVG"

      # ═══════════════════════════════════════════════════════════════════════════
      # COMMENT THREADING
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Comment — add top-level review comment"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"content":"Top-level e2e review comment","kind":"review"}')
          COMMENT_ID=$(echo "$RESP" | jq -r '.comment.id // empty')
          [ -n "$COMMENT_ID" ] \
            || (echo "❌ no comment.id in response" && exit 1)
          echo "E2E_REVIEW_COMMENT_ID=$COMMENT_ID" >> "$GITHUB_ENV"
          echo "✅ review comment OK: id=$COMMENT_ID"

      - name: "Comment — add threaded reply (parent_id)"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d "{\"content\":\"Reply to the review\",\"kind\":\"review\",\"parent_id\":\"${E2E_REVIEW_COMMENT_ID}\"}")
          REPLY_ID=$(echo "$RESP" | jq -r '.comment.id // empty')
          PARENT=$(echo "$RESP" | jq -r '.comment.parent_id // empty')
          [ -n "$REPLY_ID" ] \
            || (echo "❌ no reply comment.id" && exit 1)
          [ "$PARENT" = "$E2E_REVIEW_COMMENT_ID" ] \
            || (echo "❌ parent_id mismatch: expected $E2E_REVIEW_COMMENT_ID got $PARENT" && exit 1)
          echo "E2E_REPLY_COMMENT_ID=$REPLY_ID" >> "$GITHUB_ENV"
          echo "✅ threaded reply OK: id=$REPLY_ID, parent=$PARENT"

      - name: "Comment — list comments (original + review + reply = ≥3)"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments")
          TOTAL=$(echo "$RESP" | jq '.total // (.comments | length)')
          [ "$TOTAL" -ge 3 ] \
            || (echo "❌ expected ≥3 comments (original + review + reply), got $TOTAL" && exit 1)
          echo "✅ list comments OK: $TOTAL total"

      - name: "Comment — update comment content"
        run: |
          RESP=$(curl -sf -X PUT \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments/${E2E_REVIEW_COMMENT_ID}" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"content":"Updated review comment content"}')
          CONTENT=$(echo "$RESP" | jq -r '.comment.content // empty')
          [ "$CONTENT" = "Updated review comment content" ] \
            || (echo "❌ content not updated: got '$CONTENT'" && exit 1)
          echo "✅ update comment OK"

      - name: "Comment — delete reply comment"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X DELETE \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/comments/${E2E_REPLY_COMMENT_ID}" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          [ "$HTTP" -eq 200 ] \
            || (echo "❌ expected 200 on delete, got $HTTP" && exit 1)
          echo "✅ delete reply comment OK"

      # ═══════════════════════════════════════════════════════════════════════════
      # TAG MANAGEMENT
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Tags — add tag 'e2e-tested'"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/tags" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"tag":"e2e-tested"}')
          echo "$RESP" | jq -e '.tags | index("e2e-tested") != null' > /dev/null \
            || (echo "❌ tag 'e2e-tested' not in response: $(echo $RESP | jq -c .tags)" && exit 1)
          echo "✅ add tag OK"

      - name: "Tags — add same tag again (idempotent, no duplicates)"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/tags" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"tag":"e2e-tested"}')
          COUNT=$(echo "$RESP" | jq '[.tags[] | select(. == "e2e-tested")] | length')
          [ "$COUNT" -eq 1 ] \
            || (echo "❌ tag duplicated: found $COUNT copies" && exit 1)
          echo "✅ idempotent tag add OK (count=$COUNT)"

      - name: "Tags — remove tag and verify it is gone"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X DELETE \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/tags/e2e-tested" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          [ "$HTTP" -eq 200 ] \
            || (echo "❌ expected 200, got $HTTP" && exit 1)
          SKILL=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill")
          TAGS=$(echo "$SKILL" | jq -c '.artifact.manifest.tags // []')
          echo "$TAGS" | jq -e 'index("e2e-tested") == null' > /dev/null \
            || (echo "❌ tag still present after deletion: $TAGS" && exit 1)
          echo "✅ remove tag OK, tag gone"

      # ═══════════════════════════════════════════════════════════════════════════
      # ARTIFACT FORK
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Fork — fork smoke-skill into smoke-skill-fork"
        run: |
          RESP=$(curl -sf -X POST \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/fork" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{"new_name":"smoke-skill-fork","new_namespace":"e2eorg"}')
          FORK_NAME=$(echo "$RESP" | jq -r '.artifact.name // empty')
          FORK_NS=$(echo "$RESP" | jq -r '.artifact.namespace // empty')
          FORK_VER=$(echo "$RESP" | jq -r '.version.version // empty')
          [ "$FORK_NAME" = "smoke-skill-fork" ] \
            || (echo "❌ fork name mismatch: $FORK_NAME" && exit 1)
          [ "$FORK_NS" = "e2eorg" ] \
            || (echo "❌ fork namespace mismatch: $FORK_NS" && exit 1)
          [ "$FORK_VER" = "0.1.0" ] \
            || (echo "❌ fork should start at v0.1.0, got $FORK_VER" && exit 1)
          echo "✅ fork OK: ${FORK_NS}/${FORK_NAME}@${FORK_VER}"

      - name: "Fork — verify fork is independently retrievable"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill-fork")
          NAME=$(echo "$RESP" | jq -r '.artifact.name // empty')
          VER=$(echo "$RESP" | jq -r '.version.version // empty')
          [ "$NAME" = "smoke-skill-fork" ] \
            || (echo "❌ expected smoke-skill-fork, got $NAME" && exit 1)
          [ "$VER" = "0.1.0" ] \
            || (echo "❌ expected 0.1.0, got $VER" && exit 1)
          echo "✅ fork is retrievable: ${NAME}@${VER}"

      # ═══════════════════════════════════════════════════════════════════════════
      # PACKAGE MANAGEMENT
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Package — register github_repo package"
        run: |
          RESP=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages" \
            -H "authorization: Bearer ${E2E_TOKEN}" \
            -H 'content-type: application/json' \
            -d '{
              "source_type": "github_repo",
              "download_url": "https://github.com/loonghao/agentverse/tree/main/skills/ripgrep-search"
            }')
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          [ "$HTTP" -eq 201 ] \
            || (echo "❌ expected 201, got $HTTP — body: $BODY" && exit 1)
          PKG_ID=$(echo "$BODY" | jq -r '.package.id // empty')
          [ -n "$PKG_ID" ] \
            || (echo "❌ no package.id in response" && exit 1)
          echo "E2E_PKG_ID=$PKG_ID" >> "$GITHUB_ENV"
          echo "✅ register package OK: id=$PKG_ID"

      - name: "Package — list packages for skill"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages")
          TOTAL=$(echo "$RESP" | jq '.total // (.packages | length)')
          [ "$TOTAL" -ge 1 ] \
            || (echo "❌ expected ≥1 package, got $TOTAL" && exit 1)
          echo "✅ list packages OK: $TOTAL package(s)"

      - name: "Package — get package by ID"
        run: |
          RESP=$(curl -sf \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages/${E2E_PKG_ID}")
          ID=$(echo "$RESP" | jq -r '.package.id // empty')
          [ "$ID" = "$E2E_PKG_ID" ] \
            || (echo "❌ package id mismatch: expected $E2E_PKG_ID got $ID" && exit 1)
          echo "✅ get package by ID OK"

      - name: "Package — delete package and verify it is gone"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X DELETE \
            "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages/${E2E_PKG_ID}" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          [ "$HTTP" -eq 200 ] \
            || (echo "❌ expected 200, got $HTTP" && exit 1)
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages")
          REMAINING=$(echo "$RESP" | jq "[.packages[] | select(.id == \"$E2E_PKG_ID\")] | length")
          [ "$REMAINING" -eq 0 ] \
            || (echo "❌ package still present after deletion" && exit 1)
          echo "✅ delete package OK, verified gone"

      # ═══════════════════════════════════════════════════════════════════════════
      # PERMISSION GUARDS
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Permission — register second user (e2e_user2)"
        run: |
          RESP=$(curl -sf -X POST "http://localhost:${PORT}/api/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"username":"e2e_user2","email":"user2@agentverse.test","password":"User2Pass456!"}')
          TOKEN2=$(echo "$RESP" | jq -r '.access_token // empty')
          [ -n "$TOKEN2" ] \
            || (echo "❌ no token for e2e_user2" && exit 1)
          echo "E2E_TOKEN2=$TOKEN2" >> "$GITHUB_ENV"
          echo "✅ registered e2e_user2"

      - name: "Permission — e2e_user2 cannot publish new version of e2e_user's skill → 403"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/publish" \
            -H "authorization: Bearer ${E2E_TOKEN2}" \
            -H 'content-type: application/json' \
            -d '{"content":{"malicious":true},"bump":"major"}')
          [ "$HTTP" -eq 403 ] \
            || (echo "❌ expected 403 for non-author publish, got $HTTP" && exit 1)
          echo "✅ non-author publish → 403"

      - name: "Permission — e2e_user2 cannot register package on e2e_user's skill → 403"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/packages" \
            -H "authorization: Bearer ${E2E_TOKEN2}" \
            -H 'content-type: application/json' \
            -d '{"source_type":"url","download_url":"http://evil.example.com/bad.zip"}')
          [ "$HTTP" -eq 403 ] \
            || (echo "❌ expected 403 for non-author package register, got $HTTP" && exit 1)
          echo "✅ non-author package register → 403"

      - name: "Permission — unauthenticated request to protected publish route → 401"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/publish" \
            -H 'content-type: application/json' \
            -d '{"content":{},"bump":"patch"}')
          [ "$HTTP" -eq 401 ] \
            || (echo "❌ expected 401 for unauthenticated publish, got $HTTP" && exit 1)
          echo "✅ unauthenticated publish → 401"

      # ═══════════════════════════════════════════════════════════════════════════
      # INPUT VALIDATION
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Validation — username too short (< 3 chars) → 400"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"username":"ab","password":"ValidPass123!"}')
          [ "$HTTP" -eq 400 ] \
            || (echo "❌ expected 400 for short username, got $HTTP" && exit 1)
          echo "✅ short username → 400"

      - name: "Validation — password too short (< 8 chars) → 400"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "http://localhost:${PORT}/api/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"username":"validuser","password":"short"}')
          [ "$HTTP" -eq 400 ] \
            || (echo "❌ expected 400 for short password, got $HTTP" && exit 1)
          echo "✅ short password → 400"

      # ═══════════════════════════════════════════════════════════════════════════
      # UNLIKE & USER ARTIFACTS
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Unlike — remove like from smoke-skill"
        run: |
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -X DELETE "http://localhost:${PORT}/api/v1/skills/e2eorg/smoke-skill/likes" \
            -H "authorization: Bearer ${E2E_TOKEN}")
          [ "$HTTP" -eq 200 ] \
            || (echo "❌ expected 200 on unlike, got $HTTP" && exit 1)
          echo "✅ unlike OK"

      - name: "User — list artifacts published by e2e_user"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/users/e2e_user/artifacts")
          TOTAL=$(echo "$RESP" | jq '.total // (.items | length)')
          [ "$TOTAL" -ge 1 ] \
            || (echo "❌ expected ≥1 artifact by e2e_user, got $TOTAL" && exit 1)
          echo "✅ user artifacts OK: $TOTAL artifact(s)"

      # ═══════════════════════════════════════════════════════════════════════════
      # SEARCH
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "Search — text search finds 'smoke-skill'"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/search?q=smoke&limit=10")
          TOTAL=$(echo "$RESP" | jq '.total // (.items | length)')
          [ "$TOTAL" -ge 1 ] \
            || (echo "❌ search for 'smoke' returned 0 results" && exit 1)
          echo "✅ text search OK: $TOTAL result(s)"

      - name: "Search — filter by kind=skill returns only skills"
        run: |
          RESP=$(curl -sf "http://localhost:${PORT}/api/v1/search?q=e2e&kind=skill&limit=20")
          BAD=$(echo "$RESP" | jq '[.items[] | select(.kind != "skill")] | length')
          [ "$BAD" -eq 0 ] \
            || (echo "❌ found $BAD non-skill results with kind=skill filter" && exit 1)
          echo "✅ kind=skill filter OK, no non-skill results"

      # ═══════════════════════════════════════════════════════════════════════════
      # CLI INTEGRATION TESTS
      # All CLI tests use the pre-built ./target/debug/agentverse binary.
      # Authentication is passed via --token flag (takes precedence over saved config).
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "CLI — whoami shows e2e_user"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            --token "${E2E_TOKEN}" \
            whoami)
          echo "$OUT"
          echo "$OUT" | grep -q "e2e_user" \
            || (echo "❌ whoami output doesn't mention e2e_user" && exit 1)
          echo "✅ CLI whoami OK"

      - name: "CLI — list skill"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            --token "${E2E_TOKEN}" \
            list skill)
          echo "$OUT"
          # list outputs "<ns>/<name>" — verify at least one entry appeared
          echo "$OUT" | grep -qE "e2eorg|smoke" \
            || (echo "❌ list output doesn't contain expected entries" && exit 1)
          echo "✅ CLI list OK"

      - name: "CLI — search 'smoke'"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            search smoke)
          echo "$OUT"
          echo "$OUT" | grep -qiE "smoke|result" \
            || (echo "❌ search output doesn't mention smoke or result" && exit 1)
          echo "✅ CLI search OK"

      - name: "CLI — get skill/e2eorg/smoke-skill (latest)"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            get skill/e2eorg/smoke-skill)
          echo "$OUT"
          echo "$OUT" | grep -q "smoke-skill" \
            || (echo "❌ get output doesn't mention smoke-skill" && exit 1)
          echo "✅ CLI get (latest) OK"

      - name: "CLI — get skill/e2eorg/smoke-skill@0.1.0 (pinned version)"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            get skill/e2eorg/smoke-skill@0.1.0)
          echo "$OUT"
          echo "$OUT" | grep -q "v0.1.0" \
            || (echo "❌ get@version output doesn't show v0.1.0" && exit 1)
          echo "✅ CLI get@version OK"

      - name: "CLI — versions skill/e2eorg/smoke-skill"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            versions skill/e2eorg/smoke-skill)
          echo "$OUT"
          # versions command prints lines like "v0.1.0 (patch)"
          echo "$OUT" | grep -qE "v[0-9]+\.[0-9]+\.[0-9]+" \
            || (echo "❌ versions output has no version lines" && exit 1)
          echo "✅ CLI versions OK"

      - name: "CLI — stats skill/e2eorg/smoke-skill"
        run: |
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            stats skill/e2eorg/smoke-skill)
          echo "$OUT"
          echo "$OUT" | grep -qiE "rating|like|comment" \
            || (echo "❌ stats output is missing expected fields" && exit 1)
          echo "✅ CLI stats OK"

      - name: "CLI — publish new skill via manifest file"
        run: |
          mkdir -p /tmp/e2e-cli-skill
          cat > /tmp/e2e-cli-skill/agentverse.toml <<'TOML'
          [package]
          kind = "skill"
          namespace = "e2eorg"
          name = "cli-published-skill"
          description = "A skill published by the agentverse CLI during e2e tests"

          [capabilities]
          input_modalities = ["text"]
          output_modalities = ["text"]
          protocols = ["mcp"]
          permissions = []

          [metadata]
          tags = ["cli", "e2e", "test"]
          TOML

          cat > /tmp/e2e-cli-skill/content.json <<'JSON'
          {"schema_version": "1.0", "published_via": "cli"}
          JSON

          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            --token "${E2E_TOKEN}" \
            publish /tmp/e2e-cli-skill/agentverse.toml)
          echo "$OUT"
          echo "$OUT" | grep -qiE "published|✓" \
            || (echo "❌ publish output doesn't confirm success" && exit 1)

          # Verify the skill appeared in the registry
          NAME=$(curl -sf "http://localhost:${PORT}/api/v1/skills/e2eorg/cli-published-skill" \
            | jq -r '.artifact.name // empty')
          [ "$NAME" = "cli-published-skill" ] \
            || (echo "❌ skill not found in registry after CLI publish: got '$NAME'" && exit 1)
          echo "✅ CLI publish OK: cli-published-skill in registry"

      - name: "CLI — social on cli-published-skill (comment, like, unlike, rate)"
        run: |
          BASE="--server http://localhost:${PORT} --token ${E2E_TOKEN}"
          SKILL="skill/e2eorg/cli-published-skill"

          # comment
          OUT=$(./target/debug/agentverse $BASE comment $SKILL "CLI e2e integration comment")
          echo "$OUT" | grep -qiE "comment|✓|posted" \
            || (echo "❌ comment output unexpected: $OUT" && exit 1)
          echo "  ✅ comment OK"

          # like
          OUT=$(./target/debug/agentverse $BASE like $SKILL)
          echo "$OUT" | grep -qiE "♥|like" \
            || (echo "❌ like output unexpected: $OUT" && exit 1)
          echo "  ✅ like OK"

          # unlike
          OUT=$(./target/debug/agentverse $BASE unlike $SKILL)
          echo "$OUT" | grep -qiE "✓|unlike|unliked" \
            || (echo "❌ unlike output unexpected: $OUT" && exit 1)
          echo "  ✅ unlike OK"

          # rate (first rating for cli-published-skill, no uniqueness conflict)
          OUT=$(./target/debug/agentverse $BASE rate $SKILL 4 --review "CLI e2e rating")
          echo "$OUT" | grep -q "4/5" \
            || (echo "❌ rate output doesn't confirm 4/5: $OUT" && exit 1)
          echo "  ✅ rate OK"

          echo "✅ CLI social suite OK"

      - name: "CLI — register and login via CLI"
        run: |
          # Register a brand-new user through the CLI binary
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            register cli-e2e-user \
            --password "CliPass789!" \
            --email "cli-e2e@agentverse.test")
          echo "$OUT"
          echo "$OUT" | grep -qiE "registered|cli-e2e-user|✓" \
            || (echo "❌ register output unexpected" && exit 1)
          echo "  ✅ CLI register OK"

          # Login as the newly-registered user
          OUT=$(./target/debug/agentverse \
            --server "http://localhost:${PORT}" \
            login cli-e2e-user \
            --password "CliPass789!")
          echo "$OUT"
          echo "$OUT" | grep -qiE "logged|cli-e2e-user|✓" \
            || (echo "❌ login output unexpected" && exit 1)
          echo "  ✅ CLI login OK"
          echo "✅ CLI register & login OK"

      - name: Dump server logs
        if: always()
        run: |
          echo "=== Server logs (last 100 lines) ==="
          tail -100 /tmp/agentverse/server.log 2>/dev/null || echo "(no log file)"

      - name: Stop server
        if: always()
        run: kill "${SERVER_PID}" 2>/dev/null || true

  # ── Auto-merge on CI success ─────────────────────────────────────────────────
  # Automatically enables squash-merge for the PR once all required CI jobs
  # pass.  Release-please PRs are excluded — they must be reviewed and merged
  # manually so that the changelog and version bump can be verified.
  auto-merge:
    name: Auto-merge on CI success
    runs-on: ubuntu-latest
    # Only run on pull_request events (not on push to main).
    if: github.event_name == 'pull_request'
    # Wait for all meaningful CI gates before enabling auto-merge.
    needs: [quality, test, build, validate-skills, e2e]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Skip release-please PRs
        id: check-pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          # release-please opens PRs with a predictable title prefix and branch name.
          if echo "$PR_TITLE" | grep -qE '^(chore|release)(\(.+\))?: release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skipping auto-merge: this is a release-please PR."
          elif echo "$HEAD_BRANCH" | grep -qE '^release-please--'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skipping auto-merge: release-please branch detected."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge (squash)
        if: steps.check-pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch
          echo "✅ Auto-merge enabled for PR #${PR_NUMBER}"
