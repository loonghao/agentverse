name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger downstream workflows
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          echo "Release created: ${TAG_NAME}"

          # Build multi-platform binaries and upload to GitHub Release
          gh workflow run release.yml \
            --repo "${REPO}" \
            --field "tag_name=${TAG_NAME}"

          # Build and push Docker image to GHCR
          gh workflow run docker-publish.yml \
            --repo "${REPO}" \
            --field "version=${TAG_NAME}"

          # Package and push Helm chart to GHCR (OCI)
          gh workflow run helm-publish.yml \
            --repo "${REPO}" \
            --field "version=${TAG_NAME}"

