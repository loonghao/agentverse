version: "3.9"

services:
  # ── PostgreSQL 17 with pgvector extension ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentverse-postgres
    environment:
      POSTGRES_USER: agentverse
      POSTGRES_PASSWORD: agentverse_dev
      POSTGRES_DB: agentverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentverse -d agentverse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis for caching and rate limiting ───────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: agentverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO for artifact/binary storage (S3-compatible) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: agentverse-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MinIO bucket initialisation (runs once, exits 0) ──────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: agentverse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/agentverse &&
        mc anonymous set download local/agentverse &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ── agentverse server ─────────────────────────────────────────────────────
  # Migrations run automatically on startup via sqlx::migrate!
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentverse-server
    environment:
      DATABASE_URL: postgres://agentverse:agentverse_dev@postgres:5432/agentverse
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET: agentverse
      JWT_SECRET: dev-secret-change-in-production
      RUST_LOG: "agentverse=debug,tower_http=info"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  minio_data:

