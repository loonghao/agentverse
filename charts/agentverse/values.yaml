# Default values for agentverse.

replicaCount: 1

image:
  repository: ghcr.io/loonghao/agentverse
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentverse.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Application configuration
config:
  server:
    host: "0.0.0.0"
    port: 8080
    bodyLimit: 10485760  # 10 MB
  database:
    maxConnections: 20
    minConnections: 2
    connectTimeoutSecs: 10
  redis:
    poolSize: 10
    defaultTtlSecs: 300
  storage:
    region: "us-east-1"
    bucket: "agentverse"
  auth:
    accessTokenExpirySecs: 86400
    refreshTokenExpirySecs: 2592000

# Secrets (set via --set or use existingSecret)
secrets:
  # Use an existing k8s secret instead of creating one
  existingSecret: ""
  # If not using existingSecret, set these values:
  jwtSecret: "change-me-in-production"
  databaseUrl: ""
  redisUrl: ""
  s3Endpoint: ""
  s3AccessKey: ""
  s3SecretKey: ""

# PostgreSQL subchart configuration (bitnami)
postgresql:
  enabled: true
  auth:
    username: agentverse
    password: agentverse_secret
    database: agentverse
  primary:
    persistence:
      enabled: true
      size: 10Gi
    # Enable pgvector extension
    initdb:
      scripts:
        init.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

# Redis subchart configuration (bitnami)
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi

